                <a href="#" id="logoutBtn" class="side-menu-link">

                        <div class="side-menu-title logout-title">

            <!-- ===== Page Content ===== -->
            <div class="col-10" id="home">

                <div class="row">
                    <div class="col-12 hyder">
                        <div class="navbarcontrolicon">
                            <i class="fa-solid fa-minus" id="closing"></i>
                        </div>
                        <div class="navbarcontrolicon">
                            <i class="fa-solid fa-x" id="open"></i>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="row">
                            <div class="col-12">
                                <div class="add-admin">Add trainee</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-12">
                                <div class="add-form">

                                    <div class="avatar-box text-center">
                                        <img src="../../assets/imge/avatar_holder_dashboard.gif" alt="profile"
                                            id="avatarPreview">
                                        <input type="file" id="avatarInput" hidden accept="image/*">
                                    </div>

                                    <div class="row p-4">
                                        <div class="col-6">
                                            <label class="firstName-label">First name</label>
                                            <input type="text" class="form-control firstName-input" id="firstName"
                                                placeholder="First name">
                                        </div>

                                        <div class="col-6">
                                            <label class="lastName-label">Last name</label>
                                            <input type="text" class="form-control lastName-input" id="lastName"
                                                placeholder="Last name">
                                        </div>
                                    </div>

                                    <div class="row p-4">
                                        <div class="col-6 mb-3">
                                            <label class="email-label">Email</label>
                                            <input type="email" class="form-control email-input" id="email"
                                                placeholder="Enter email">
                                        </div>

                                        <div class="col-6 mb-3">
                                            <label class="phone-label">Phone number</label>
                                            <div class="d-flex phone-box">
                                                <select class="form-control country-select" id="countryCode">
                                                    <option value="" disabled selected>Country</option>
                                                    <option value="20">EG</option>
                                                    <option value="966">SA</option>
                                                </select>
                                                <input type="text" class="form-control phone-input" id="phone"
                                                    placeholder="Phone number">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row p-4">
                                        <div class="col-6">
                                            <label class="firstName-label">Password</label>
                                            <input type="password" class="form-control firstName-input" id="Password"
                                                placeholder="Password">
                                        </div>

                                        <div class="col-6">
                                            <label class="lastName-label">Confirm password</label>
                                            <input type="password" class="form-control lastName-input"
                                                id="ConfirmPassword" placeholder="Confirm password">
                                        </div>
                                    </div>

                                    <button id="submit-btn">Submit</button>

                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>

        </div>
    </div>
