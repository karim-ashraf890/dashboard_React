<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="/assets/imge/trainee-mart-logo.svg">
    <title>Dashboard</title>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="offset-4 col-4">
                <div class="loginbox">
                    <div class="row">
                        <div class="col-12 d-flex justify-content-center">
                            <div class="Signin">
                                <span class="highlight">Si</span>gn in
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12 d-flex justify-content-center">
                            <div id="errorContainer">
                            </div>
                        </div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="form-group">
                                <label for="signIn">Email address</label><br>
                                <input class="inputsignin" type="text" id="signIn" placeholder="Example@mail.com">
                            </div>
                        </div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="form-group">
                                <label for="fname">Password</label><br>
                                <input class="inputsignin" type="password" id="Password"
                                    placeholder="Enter your password">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <button class="buttonsignin" id="login" type="submit">Login</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>


</body>

</html>
